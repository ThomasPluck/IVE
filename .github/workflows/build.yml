name: Build VSIX

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: cd webview && npm ci
      - run: npm test
      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: ive-vsix
          path: "*.vsix"
